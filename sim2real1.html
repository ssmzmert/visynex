<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visynex Sim2Real Data Generation Simulator</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --sim-bg: #111827;
            --real-bg: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #38bdf8;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            margin: 0;
        }

        .dashboard {
            background-color: #1e293b;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 900px;
            width: 100%;
        }

        .header {
            margin-bottom: 20px;
            text-align: center;
        }

        .header h2 {
            margin: 0 0 8px 0;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 14px;
        }

        canvas {
            width: 100%;
            height: 400px;
            background: linear-gradient(90deg, var(--sim-bg) 50%, var(--real-bg) 50%);
            border-radius: 8px;
            border: 1px solid #334155;
            display: block;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #334155;
            flex-wrap: wrap;
            gap: 20px;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 200px;
        }

        label {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type=range] {
            width: 100%;
            accent-color: var(--accent);
        }

        .metrics {
            background-color: #0f172a;
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            text-align: center;
            min-width: 250px;
        }

        .metrics .value {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent);
            font-variant-numeric: tabular-nums;
        }

        .metrics .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <h2>Sim2Real Data Generation</h2>
            <p>Visualizing procedural physical chaos and auto-annotation for Embodied AI.</p>
        </div>

        <canvas id="simCanvas" width="852" height="400"></canvas>

        <div class="controls">
            <div class="slider-group">
                <label for="chaosSlider">Physical Chaos Complexity (Noise & Drift)</label>
                <input type="range" id="chaosSlider" min="1" max="10" value="8">
            </div>

            <div class="slider-group">
                <label for="countSlider">Object Count / Variability</label>
                <input type="range" id="countSlider" min="1" max="10" value="7">
            </div>

            <div class="metrics">
                <div class="value" id="frameCount">0</div>
                <div class="label">Auto-Annotated Frames Generated</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const chaosSlider = document.getElementById('chaosSlider');
        const countSlider = document.getElementById('countSlider');
        const frameDisplay = document.getElementById('frameCount');

        let shapes = [];
        let totalFrames = 0;
        const shapeTypes = ['gear', 'bearing', 'bracket'];

        // Helper functions to draw industrial shapes
        function drawGear(ctx, size) {
            const radius = size / 2;
            const teeth = 8;
            ctx.beginPath();
            for(let i = 0; i < teeth; i++) {
                const angle = (i / teeth) * Math.PI * 2;
                // Outer tooth
                ctx.lineTo(Math.cos(angle - 0.1) * radius, Math.sin(angle - 0.1) * radius);
                ctx.lineTo(Math.cos(angle + 0.1) * radius, Math.sin(angle + 0.1) * radius);
                // Inner valley
                ctx.lineTo(Math.cos(angle + 0.25) * (radius * 0.7), Math.sin(angle + 0.25) * (radius * 0.7));
                ctx.lineTo(Math.cos(angle + 0.35) * (radius * 0.7), Math.sin(angle + 0.35) * (radius * 0.7));
            }
            ctx.closePath();
            // Inner bore hole (draw counter-clockwise to create a cutout when filling)
            ctx.moveTo(radius * 0.3, 0);
            ctx.arc(0, 0, radius * 0.3, 0, Math.PI * 2, true);
        }

        function drawBearing(ctx, size) {
            const r = size / 2;
            ctx.beginPath();
            ctx.arc(0, 0, r, 0, Math.PI * 2); // Outer ring
            ctx.moveTo(r * 0.6, 0);
            ctx.arc(0, 0, r * 0.6, 0, Math.PI * 2, true); // Inner ring
            // Inner bore hole
            ctx.moveTo(r * 0.3, 0);
            ctx.arc(0, 0, r * 0.3, 0, Math.PI * 2, false);
            // Draw balls in the race
            const balls = 8;
            for(let i = 0; i < balls; i++) {
                const angle = (i / balls) * Math.PI * 2;
                const ballDist = r * 0.45;
                ctx.moveTo(Math.cos(angle) * ballDist + r * 0.1, Math.sin(angle) * ballDist);
                ctx.arc(Math.cos(angle) * ballDist, Math.sin(angle) * ballDist, r * 0.1, 0, Math.PI * 2);
            }
        }

        function drawBracket(ctx, size) {
            const w = size * 1.2;
            const h = size * 0.5;
            ctx.beginPath();
            // Draw rounded rectangle for robotic link
            ctx.roundRect(-w/2, -h/2, w, h, h/3);
            // Draw mounting holes (counter-clockwise for cutout)
            const holeDist = w/2 - h/2;
            ctx.moveTo(-holeDist + h*0.15, 0);
            ctx.arc(-holeDist, 0, h*0.15, 0, Math.PI * 2, true);
            ctx.moveTo(holeDist + h*0.15, 0);
            ctx.arc(holeDist, 0, h*0.15, 0, Math.PI * 2, true);
        }

        // Add a polyfill for roundRect if older browser
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                return this;
            }
        }

        // Create objects moving through the pipeline
        function generateShapes() {
            shapes = [];
            const count = parseInt(countSlider.value) * 3; 
            for (let i = 0; i < count; i++) {
                shapes.push({
                    x: Math.random() * canvas.width,
                    y: 40 + Math.random() * (canvas.height - 80),
                    size: 25 + Math.random() * 30,
                    speed: 1.0 + Math.random() * 2,
                    rotation: Math.random() * Math.PI * 2,
                    rotSpeed: (Math.random() - 0.5) * 0.05,
                    type: shapeTypes[Math.floor(Math.random() * shapeTypes.length)],
                    offsetY: Math.random() * 100 
                });
            }
        }

        // Animation Loop
        function animate(time) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const chaosLevel = parseInt(chaosSlider.value);
            const halfWidth = canvas.width / 2;

            // Draw Section Labels
            ctx.fillStyle = '#6b7280';
            ctx.font = '12px "Segoe UI", sans-serif';
            ctx.letterSpacing = "1px";
            ctx.fillText('DIGITAL CONCEPTION (SIM)', 20, 25);
            ctx.fillText('PHYSICAL SYNTHESIS (REAL)', halfWidth + 20, 25);

            // Draw center dividing line
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(halfWidth, 0);
            ctx.lineTo(halfWidth, canvas.height);
            ctx.stroke();

            shapes.forEach(shape => {
                shape.x += shape.speed;
                shape.rotation += shape.rotSpeed;
                
                const currentY = shape.y + Math.sin(time / 500 + shape.offsetY) * 15;

                if (shape.x > canvas.width + 50) {
                    shape.x = -50;
                }

                const isRightSide = shape.x > halfWidth;

                ctx.save();

                if (isRightSide) {
                    // --- CHAOTIC REAL-WORLD SYNTHESIS ---
                    
                    const jitterX = (Math.random() - 0.5) * chaosLevel * 1.5;
                    const jitterY = (Math.random() - 0.5) * chaosLevel * 1.5;
                    const renderX = shape.x + jitterX;
                    const renderY = currentY + jitterY;

                    // Setup rendering matrix
                    ctx.translate(renderX, renderY);
                    ctx.rotate(shape.rotation);

                    // Draw Gritty Industrial Object
                    ctx.fillStyle = '#9ca3af';     // Solid metal color
                    ctx.strokeStyle = '#4b5563';   // Darker contour
                    ctx.lineWidth = 1.5;

                    if (shape.type === 'gear') drawGear(ctx, shape.size);
                    if (shape.type === 'bearing') drawBearing(ctx, shape.size);
                    if (shape.type === 'bracket') drawBracket(ctx, shape.size);
                    
                    ctx.fill("evenodd");
                    ctx.stroke();

                    // Restore coordinates for absolute positioning of box & dust
                    ctx.restore();
                    ctx.save();

                    // Environmental Noise (Dust/Particles)
                    if (Math.random() < chaosLevel * 0.08) {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                        ctx.fillRect(renderX + (Math.random() * 80 - 40), renderY + (Math.random() * 80 - 40), 2, 2);
                    }

                    // Auto-Annotation Bounding Box 
                    const sensorError = chaosLevel * 2; 
                    ctx.strokeStyle = '#ef4444'; 
                    ctx.lineWidth = 1;
                    ctx.setLineDash([4, 2]); 
                    
                    // Box logic (needs to cover the rotated shape size roughly)
                    const boxSize = shape.size * 1.3 + sensorError;
                    ctx.strokeRect(
                        renderX - boxSize/2, 
                        renderY - boxSize/2, 
                        boxSize, 
                        boxSize
                    );

                    totalFrames += (chaosLevel * 0.1);

                } else {
                    // --- PRISTINE DIGITAL CONCEPT ---
                    
                    ctx.translate(shape.x, currentY);
                    ctx.rotate(shape.rotation);

                    ctx.strokeStyle = '#38bdf8'; // Clean blue wireframe
                    ctx.lineWidth = 1.5;
                    
                    if (shape.type === 'gear') drawGear(ctx, shape.size);
                    if (shape.type === 'bearing') drawBearing(ctx, shape.size);
                    if (shape.type === 'bracket') drawBracket(ctx, shape.size);
                    
                    ctx.stroke();
                }

                ctx.restore();
            });

            // Update Metrics Display
            frameDisplay.innerText = Math.floor(totalFrames).toLocaleString();

            requestAnimationFrame(animate);
        }

        // Initialize and listen for changes
        countSlider.addEventListener('input', generateShapes);
        generateShapes();
        requestAnimationFrame(animate);

    </script>
</body>
</html>
